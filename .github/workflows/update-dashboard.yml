name: 🔄 Dashboard aktualisieren

on:
  # Automatisch: täglich um 06:00 und 14:00 Uhr (UTC = 08:00 / 16:00 MEZ)
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 14 * * *'

  # Manuell: jederzeit per Knopfdruck auf GitHub ausführbar
  workflow_dispatch:

# Berechtigung zum Zurückschreiben ins Repo
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1. Repository auschecken
      - name: 📥 Repo auschecken
        uses: actions/checkout@v4

      # 2. Python einrichten
      - name: 🐍 Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Python-Abhängigkeiten installieren
      - name: 📦 Dependencies installieren
        run: pip install -r requirements.txt

      # 4. Dashboard-Daten aktualisieren (Sofascore → season-finish.html)
      - name: 📊 Dashboard aktualisieren
        run: python update_dashboard.py
        continue-on-error: true

      # 5. Statistiken aktualisieren (Understat xG, Elo etc. → stats_cache.json)
      - name: 📈 Statistiken aktualisieren
        run: python refresh_stats.py
        continue-on-error: true

      # 6. Heutige Picks speichern (matches_today.json → picks_history.json)
      - name: 📝 Picks speichern
        run: python save_picks.py
        continue-on-error: true

      # 7. Vergangene Picks auswerten (Sofascore Ergebnisse → picks_history.json)
      - name: ✅ Picks auswerten
        run: python resolve_picks.py
        continue-on-error: true

      # 8. Geänderte Dateien zurück ins Repo committen und pushen
      - name: 💾 Änderungen speichern & pushen
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "actions@github.com"
          git add season-finish.html stats_cache.json picks_history.json
          # Nur committen wenn wirklich etwas geändert wurde
          if git diff --staged --quiet; then
            echo "Keine Änderungen — kein Commit nötig."
          else
            git commit -m "🔄 Auto-Update $(date +'%d.%m.%Y %H:%M') UTC"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
