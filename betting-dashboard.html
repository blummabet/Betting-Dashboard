<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetEdge – Daily Picks</title>
<style>
:root {
  --bg: #0d1117; --card: #161b22; --card2: #1c2128; --border: #30363d;
  --accent: #00d4a1; --red: #f85149; --yellow: #e3b341;
  --text: #e6edf3; --muted: #8b949e;
  --green: #3fb950; --blue: #58a6ff; --purple: #a78bfa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

/* HEADER */
.header {
  background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { font-size: 24px; }
.logo-text { font-size: 19px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
.logo-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.updated { font-size: 11px; color: var(--muted); text-align: right; }
.updated span { color: var(--accent); font-weight: 600; }

/* LEAGUE NAV */
.league-nav {
  background: var(--card); border-bottom: 2px solid var(--border);
  padding: 0 16px; display: flex; align-items: stretch;
  overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.league-nav::-webkit-scrollbar { display: none; }
.league-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 11px 16px; background: none; border: none;
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  color: var(--muted); font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap; transition: color .15s, border-color .15s;
  font-family: inherit;
}
.league-btn:hover { color: var(--text); }
.league-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.league-btn .lf { font-size: 17px; line-height: 1; }

/* MAIN */
.container { max-width: 960px; margin: 0 auto; padding: 24px 20px; }

/* NOTICES */
.intl-break-notice {
  background: linear-gradient(135deg, #0d1f3a 0%, #0d1117 100%);
  border: 1px solid #1d4ed855; border-radius: 10px; padding: 14px 20px;
  text-align: center; margin-bottom: 20px; font-size: 13px; color: var(--muted); line-height: 1.7;
}
.intl-break-notice strong { color: var(--blue); }
.data-notice {
  background: #0d2010; border: 1px solid #1a4020; border-radius: 8px;
  padding: 10px 14px; font-size: 11px; color: #5fb870; margin-bottom: 20px;
  display: flex; align-items: center; gap: 8px;
}
.coverage-notice {
  background: #1a1500; border: 1px solid #3d3000; border-radius: 10px;
  padding: 13px 18px; font-size: 12px; color: var(--yellow); line-height: 1.6; margin-bottom: 20px;
}

/* SECTION LABEL */
.section-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
  color: var(--muted); margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* PICK GRID */
.picks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
@media (max-width: 640px) { .picks-grid { grid-template-columns: 1fr; } }

/* PICK CARD */
.pick-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 18px; display: flex; flex-direction: column; gap: 10px;
  position: relative; overflow: hidden; transition: transform .1s, border-color .2s;
}
.pick-card:hover { transform: translateY(-2px); }
.pick-card.shots   { border-left: 3px solid var(--blue); }
.pick-card.shots:hover { border-color: var(--blue); }
.pick-card.scorer  { border-left: 3px solid var(--purple); }
.pick-card.scorer:hover { border-color: var(--purple); }
.pick-card.xgval   { border-left: 3px solid var(--green); }
.pick-card.xgval:hover { border-color: var(--green); }
.pick-card.hot     { border-left: 3px solid var(--yellow); }
.pick-card.hot:hover { border-color: var(--yellow); }

.pick-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
}
.pick-card.shots::before  { background: linear-gradient(90deg, var(--blue), transparent); }
.pick-card.scorer::before { background: linear-gradient(90deg, var(--purple), transparent); }
.pick-card.xgval::before  { background: linear-gradient(90deg, var(--green), transparent); }
.pick-card.hot::before    { background: linear-gradient(90deg, var(--yellow), transparent); }

.pick-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }

.pick-type-badge {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
  padding: 3px 8px; border-radius: 4px; white-space: nowrap;
}
.badge-shots  { background: #0d1f2d; color: var(--blue); }
.badge-scorer { background: #1a0d30; color: var(--purple); }
.badge-xgval  { background: #0d2818; color: var(--green); }
.badge-hot    { background: #2d1b00; color: var(--yellow); }

.pick-odds {
  font-size: 20px; font-weight: 700; color: var(--accent);
  background: #0d201a; border: 1px solid #1a3d30;
  border-radius: 6px; padding: 4px 10px; white-space: nowrap;
  line-height: 1.2; text-align: center; min-width: 60px;
}
.pick-odds.purple { color: var(--purple); background: #140d24; border-color: #2d1a4d; }
.pick-odds.yellow { color: var(--yellow); background: #1e1500; border-color: #3d3000; }

.pick-match { font-size: 12px; color: var(--muted); }
.pick-bet   { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.3; }

/* STATS BAR – the key new element */
.pick-stats {
  display: flex; gap: 10px; flex-wrap: wrap;
}
.stat-chip {
  display: flex; flex-direction: column; align-items: center;
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 10px; min-width: 56px;
}
.stat-chip .sv { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.1; }
.stat-chip .sk { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }
.stat-chip.highlight .sv { color: var(--accent); }
.stat-chip.warn .sv { color: var(--yellow); }
.stat-chip.good .sv { color: var(--green); }
.stat-chip.bad .sv  { color: var(--red); }

.pick-reason {
  font-size: 12px; color: var(--muted); line-height: 1.65;
  border-top: 1px solid var(--border); padding-top: 9px;
}
.pick-reason strong { color: var(--text); }

.pick-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }

.confidence-wrap { display: flex; align-items: center; gap: 5px; }
.confidence-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.confidence-dots { display: flex; gap: 3px; }
.conf-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
.conf-dot.green  { background: var(--green); }
.conf-dot.yellow { background: var(--yellow); }
.conf-dot.blue   { background: var(--blue); }
.conf-dot.purple { background: var(--purple); }

.stake-tag {
  font-size: 10px; color: var(--muted); background: var(--card2);
  padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border);
  font-family: 'SF Mono', Consolas, monospace;
}

/* SHOT LEADERS REFERENCE */
.leaders-ref {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; margin-bottom: 24px;
}
.leaders-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.leader-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1px solid; background: #0d1f2d; border-color: #1d3f5d; color: var(--blue);
  cursor: default;
}
.leader-pill .lp-name { color: #c0d8f0; }
.leader-pill .lp-team { font-size: 10px; color: var(--muted); font-weight: 400; }
.leader-pill .lp-stat { font-weight: 700; }
.leader-pill.xgr { background: #0d2818; border-color: #1a5030; color: var(--green); }
.leader-pill.xgr .lp-name { color: #c0f0d0; }

/* POLYMARKET */
.pm-picks-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 24px; }
@media (max-width: 640px) { .pm-picks-grid { grid-template-columns: 1fr; } }
.pm-pick-card {
  background: var(--card2); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; text-align: center;
}
.pm-pick-league { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.pm-pick-team  { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.pm-pick-prob  { font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 4px; }
.pm-pick-prob.ucl  { color: var(--blue); }
.pm-pick-prob.wc   { color: var(--purple); }
.pm-pick-vol   { font-size: 10px; color: var(--muted); margin-bottom: 8px; }
.pm-pick-label { font-size: 11px; font-weight: 600; color: var(--green); line-height: 1.5; }
.pm-pick-label.blue   { color: var(--blue); }
.pm-pick-label.purple { color: var(--purple); }
.pm-pick-label.yellow { color: var(--yellow); }

/* FOOTER */
.footer {
  text-align: center; padding: 20px; color: var(--muted); font-size: 11px;
  border-top: 1px solid var(--border); margin-top: 8px;
}
.footer a { color: var(--accent); text-decoration: none; }
</style>

//  RENDER ENGINE
// ═══════════════════════════════════════════════════

function dots(n, cls) {
  return Array.from({length:5},(_,i)=>`<span class="conf-dot${i<n?' '+cls:''}"></span>`).join('');
}

function renderStatChips(stats) {
  return stats.map(s =>
    `<div class="stat-chip${s.cls?' '+s.cls:''}"><div class="sv">${s.v}</div><div class="sk">${s.k}</div></div>`
  ).join('');
}

function renderPickCard(p) {
  return `
    <div class="pick-card ${p.type}">
      <div class="pick-header">
        <span class="pick-type-badge ${p.badgeClass}">${p.badge}</span>
        <div class="pick-odds${p.oddsClass?' '+p.oddsClass:''}">${p.odds}</div>
      </div>
      <div class="pick-match">${p.match}</div>
      <div class="pick-bet">${p.bet}</div>
      <div class="pick-stats">${renderStatChips(p.stats)}</div>
      <div class="pick-reason">${p.reason}</div>
      <div class="pick-footer">
        <div class="confidence-wrap">
          <span class="confidence-label">Conf</span>
          <div class="confidence-dots">${dots(p.conf, p.confClass)}</div>
        </div>
        <span class="stake-tag">${p.stakeTag}</span>
      </div>
    </div>`;
}

function renderLeaders(leaders, flag) {
  if (!leaders || leaders.length === 0) return '';
  const pills = leaders.map(l => `
    <div class="leader-pill${l.type==='xgr'?' xgr':''}">
      <span class="lp-name">${l.name}</span>
      <span class="lp-team">${l.team}</span>
      <span class="lp-stat">${l.sh90} sh/90</span>
      <span class="lp-stat" style="color:var(--muted);font-size:10px">xG ${l.xG90}</span>
    </div>`).join('');
  return `
    <div class="section-label">📊 Shot Leaders · ${flag} Saison 2025/26 <span style="font-weight:400;font-size:10px;color:var(--muted);text-transform:none;letter-spacing:0">&nbsp;(Understat live) · 🔵 Normal · 🟢 xG-Regression</span></div>
    <div class="leaders-ref">
      <div style="font-size:11px;color:var(--muted)">Sh/90 Min. 800 Spielminuten · xG/90 = Schussqualität · Grün = xG deutlich über Goals (Regression fällig)</div>
      <div class="leaders-pills">${pills}</div>
    </div>`;
}

function renderWeakDefs(defs, flag) {
  const items = defs.map(d =>
    `<span style="background:var(--card2);border:1px solid #4d1010;border-radius:6px;padding:4px 10px;font-size:11px;color:#f0b0b0">
      ${d.name} <strong style="color:var(--red)">${d.xGA} xGA</strong>
    </span>`
  ).join('');
  return `
    <div class="section-label">🎯 Schwächste Abwehren · ${flag} (beste Gegner für Shots-Picks)</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px">${items}</div>`;
}

function renderLeague(key) {
  const L = LEAGUE_DATA[key];
  if (!L) return;

  const shotsPicks  = L.picks.filter(p => p.type === 'shots' || p.type === 'hot');
  const valuePicks  = L.picks.filter(p => p.type === 'scorer' || p.type === 'xgval');

  const coverageHtml = L.coverageNote
    ? `<div class="coverage-notice">⚠️ ${L.coverageNote}</div>` : '';

  const html = `
    <div class="intl-break-notice">
      🌍 <strong>Länderspielpause endet heute · 31. März 2026</strong><br>
      Ligen starten wieder am <strong>Wochenende 4./5./6. April</strong> — ${L.matchday}. Picks jetzt auf Stake vormerken.
    </div>
    <div class="data-notice">
      ✅ <strong>Live-Daten:</strong> Alle Player- und Team-Stats direkt von <strong>Understat.com</strong> gezogen · Stand 31.03.2026 · Saison 2025/26
    </div>
    ${coverageHtml}

    <div class="section-label">🎯 Shots Over Picks · ${L.matchday}</div>
    <div class="picks-grid">${shotsPicks.map(renderPickCard).join('')}</div>

    <div class="section-label">⚽ Scorer &amp; xG Value · ${L.matchday}</div>
    <div class="picks-grid">${valuePicks.map(renderPickCard).join('')}</div>

    ${renderWeakDefs(L.weakestDefs, L.flag)}
    ${renderLeaders(L.leaders, L.flag)}

    <div class="section-label">🏆 Polymarket Value · ${L.flag} ${L.name}</div>
    <div class="pm-picks-grid">
      ${L.pmCards.map(c => `
        <div class="pm-pick-card">
          <div class="pm-pick-league">${c.league}</div>
          <div class="pm-pick-team">${c.team}</div>
          <div class="pm-pick-prob${c.probClass?' '+c.probClass:''}">${c.prob}</div>
          <div class="pm-pick-vol">${c.vol}</div>
          <div class="pm-pick-label${c.labelClass?' '+c.labelClass:''}">${c.label}</div>
        </div>`).join('')}
    </div>`;

  document.getElementById('mainContent').innerHTML = html;
}

document.querySelectorAll('.league-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.league-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderLeague(btn.dataset.league);
  });
});

renderLeague('epl');
</script>
</body>
</html>
